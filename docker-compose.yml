services:
  postgres:
    image: postgres:17-alpine
    container_name: greenherb-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-greenherb_dev}
      POSTGRES_USER: ${POSTGRES_USER:-greenherb}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-greenherb}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - greenherb-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-greenherb} -d ${POSTGRES_DB:-greenherb_dev}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  greenherb-postgres:
